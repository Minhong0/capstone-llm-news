<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 20px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #1a73e8; color: #ffffff; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: -1px; }
        .content { padding: 30px; }
        .date { color: #666; font-size: 14px; margin-bottom: 20px; display: block; }
        .summary-box { background: #f8f9fa; border-left: 5px solid #1a73e8; padding: 20px; border-radius: 4px; white-space: pre-wrap; font-size: 16px; color: #444; }
        .footer { background: #eee; padding: 20px; text-align: center; font-size: 12px; color: #888; }
        .footer a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Daily IT Trend Report</h1>
        </div>
        <div class="content">
            <span class="date">📅 {{ date }} | AI 기반 자동 요약 리포트</span>
            <p style="font-weight: bold; font-size: 18px; color: #1a73e8;">오늘의 핵심 트렌드 요약</p>
            <div class="summary-box">
{{ summary }}
            </div>
        </div>
        <div class="footer">
            본 메일은 캡스톤 디자인 프로젝트에 의해 자동으로 생성되었습니다.<br>
            <a href="https://github.com/내아이디/daily-it-news-bot">GitHub 저장소 방문하기</a>
        </div>
    </div>
</body>
</html>
